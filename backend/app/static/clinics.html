<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Registered Clinics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
  <div class="page">
    <div class="shell">
      <header class="shell-header">
        <div class="brand">
          <div class="brand-icon">
            <div class="brand-icon-inner">FC</div>
          </div>
          <div class="brand-text">
            <div class="brand-name">Faces CRM</div>
            <div class="brand-tagline">Registered clinics near your users</div>
          </div>
        </div>
        <a href="/" class="btn btn-secondary" style="text-decoration: none;">← Back to search</a>
      </header>

      <main>
        <section class="card" aria-label="Registered clinics list">
          <header class="card-header">
            <div class="card-title">Registered clinics</div>
          </header>

          <p class="field-hint" id="clinics-hint">
            Loading clinics from the <code>registered_clinics</code> database table…
          </p>

          <div id="clinics-list" class="clinics-buttons"></div>
        </section>
      </main>

      <footer class="footer">
        <span>
          <span class="footer-dot"></span>
          This page reads directly from Postgres (via FastAPI).
        </span>
        <a href="/docs" class="footer-link">View API documentation</a>
      </footer>
    </div>
  </div>

  <script>
    (async function () {
      const listEl = document.getElementById("clinics-list");
      const hintEl = document.getElementById("clinics-hint");
      const params = new URLSearchParams(window.location.search);
      const keyword = params.get("keyword");

      // Fire the legacy search pipeline in the background after the page is visible.
      fetch("/api/legacy-search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword: keyword || null }),
      }).catch(() => {
        // Ignore errors here; the clinics list below is still loaded.
      });

      function renderClinic(clinic) {
        const container = document.createElement("div");
        container.className = "clinic-item";
        const nameEl = document.createElement("span");
        nameEl.className = "clinic-name";
        nameEl.textContent = clinic.name;
        const btn = document.createElement("button");
        btn.className = "clinic-btn";
        btn.textContent = "Call the clinic";
        btn.onclick = () => {
          // TODO: Add action for this clinic
          console.log("Action for clinic:", clinic.id);
        };
        container.appendChild(nameEl);
        container.appendChild(btn);
        return container;
      }

      try {
        const res = await fetch("/api/clinics/registered");

        if (!res.ok) {
          throw new Error("Request failed: " + res.status);
        }
        const data = await res.json();


        if (!Array.isArray(data) || data.length === 0) {
          hintEl.textContent = "No registered clinics found yet.";
          return;
        }

        hintEl.textContent = `Showing ${data.length} registered clinic${data.length === 1 ? "" : "s"}.`;

        data.forEach((clinic) => {
          listEl.appendChild(renderClinic(clinic));
        });
      } catch (err) {
        hintEl.textContent = "Error loading clinics: " + err.message;
      }
    })();
  </script>
</body>

</html>
